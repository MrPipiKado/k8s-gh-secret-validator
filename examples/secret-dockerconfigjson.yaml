# Registry pull secret: the token is nested under auths.<registry>.
# The "auth" field is base64("bot:ghp_REPLACE_ME"); "password" is also present.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: default
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"ghcr.io":{"username":"bot","password":"ghp_REPLACE_ME","auth":"Ym90OmdocF9SRVBMQUNFX01F"}}}
