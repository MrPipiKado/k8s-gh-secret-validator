# Typical real usage: a mix of plain and dockerconfigjson secrets in one run.
warn_days: 7
github_api_url: https://api.github.com
secrets:
  - namespace: default
    name: github-creds
    keys: [token]
  - namespace: default
    name: ghcr-pull
    keys: [".dockerconfigjson"]
notifiers:
  teams:
    enabled: false
    webhook_url: ""
