image:
  repository: token-validator
  tag: ""                 # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []

# CronJob schedule (cron syntax). Default: daily at 08:00.
schedule: "0 8 * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
backoffLimit: 1

# Pass extra CLI args to the container, e.g. ["--json"].
extraArgs:
  - "--fail-on-expiring"

serviceAccount:
  create: true
  name: ""               # defaults to the fullname when empty

rbac:
  create: true
  # "cluster": ClusterRole/Binding to read secrets in any namespace (default,
  #            needed when config.secrets span multiple namespaces).
  # "namespace": Role/Binding scoped to the release namespace only.
  scope: cluster

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
securityContext:
  runAsNonRoot: true
  runAsUser: 10001

# ---------------------------------------------------------------------------
# Application config. This whole tree is rendered VERBATIM into config.yaml and
# mounted into the container, so it mirrors the app's config file exactly (keys
# are snake_case). Override it with --set, or supply your own with
# `helm install -f my-config-values.yaml`.
# ---------------------------------------------------------------------------
config:
  warn_days: 7
  github_api_url: https://api.github.com
  secrets:
    - namespace: default
      name: github-creds
      keys: [token]
    - namespace: default
      name: ghcr-pull
      keys: [".dockerconfigjson"]
  notifiers:
    teams:
      enabled: false
      # Leave webhook_url empty here — it is injected at runtime via the
      # TEAMS_WEBHOOK_URL env var from the webhook delivery settings below.
      webhook_url: ""

# Teams webhook *delivery* (only used when config.notifiers.teams.enabled).
# Provide the webhook inline (chart creates a Secret) OR reference an existing
# Secret. Injected into the CronJob as TEAMS_WEBHOOK_URL.
teamsWebhook:
  webhookUrl: ""
  existingSecret: ""
  existingSecretKey: webhook_url
