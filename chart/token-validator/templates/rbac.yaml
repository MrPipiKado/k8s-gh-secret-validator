{{- if .Values.rbac.create -}}
{{- if eq .Values.rbac.scope "cluster" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "token-validator.fullname" . }}-secret-reader
  labels:
    {{- include "token-validator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "token-validator.fullname" . }}-secret-reader
  labels:
    {{- include "token-validator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "token-validator.fullname" . }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "token-validator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "token-validator.fullname" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "token-validator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "token-validator.fullname" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "token-validator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "token-validator.fullname" . }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "token-validator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end -}}
